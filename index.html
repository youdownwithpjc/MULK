<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MULK</title>

<style>

body {

  font-family: -apple-system, BlinkMacSystemFont, sans-serif;

  padding:20px;

  max-width:500px;

  margin:auto;

}

.card {

  border:1px solid #ddd;

  border-radius:12px;

  padding:15px;

  margin-bottom:15px;

}

button {

  font-size:18px;

  padding:10px 15px;

  border-radius:10px;

}

input {

  width:95%;

  padding:8px;

  margin:4px;

}

</style>

</head>

<body>

<h1>MULK</h1>

<div class="card">

<h2>💪 Daily Fitness</h2>

<p>Pull-ups: <span id="pullups">0</span> / 15</p>

<button onclick="addRep('pullups')">+1</button>

<p>Push-ups: <span id="pushups">0</span> / 50</p>

<button onclick="addRep('pushups')">+1</button>

<p>Crunches: <span id="crunches">0</span> / 50</p>

<button onclick="addRep('crunches')">+1</button>

</div>

<div class="card">

<h2>🍎 Add Food</h2>

<input id="food" placeholder="Food name">

<input id="calories" placeholder="Calories" type="number">

<input id="protein" placeholder="Protein g" type="number">

<input id="carbs" placeholder="Carbs g" type="number">

<input id="fat" placeholder="Fat g" type="number">

<input id="fiber" placeholder="Fiber g" type="number">

<button onclick="addFood()">Add Food</button>

</div>

<div class="card">

<h2>📊 Today's Nutrition</h2>

<p>Calories: <span id="totalCalories">0</span></p>

<p>Protein: <span id="totalProtein">0</span> g</p>

<p>Carbs: <span id="totalCarbs">0</span> g</p>

<p>Fat: <span id="totalFat">0</span> g</p>

<p>Fiber: <span id="totalFiber">0</span> g</p>

</div>

<div class="card">

<h2>🍽 Food Log</h2>

<div id="foodList"></div>

</div>

<script src="app.js"></script>

</body>

</html>
