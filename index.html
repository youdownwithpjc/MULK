<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MULK</title>

<style>

body {

  font-family: -apple-system, BlinkMacSystemFont, sans-serif;

  padding:20px;

  max-width:500px;

  margin:auto;

}

.card {

  border:1px solid #ddd;

  border-radius:12px;

  padding:15px;

  margin-bottom:15px;

}

button {

  font-size:18px;

  padding:10px 15px;

  border-radius:10px;

}

input {

  width:95%;

  padding:8px;

  margin:4px;

}

</style>

</head>

<body>

<h1>MULK</h1>

<div class="card">

<h2>💪 Daily Fitness</h2>

<p>Pull-ups: <span id="pullups">0</span> / 15</p>

<button onclick="addRep('pullups')">+1</button>

<p>Push-ups: <span id="pushups">0</span> / 50</p>

<button onclick="addRep('pushups')">+1</button>

<p>Crunches: <span id="crunches">0</span> / 50</p>

<button onclick="addRep('crunches')">+1</button>

</div>

<div class="card">

<h2>🍎 Add Food</h2>

<input id="food" placeholder="Food name">

<input id="calories" placeholder="Calories" type="number">

<input id="protein" placeholder="Protein g" type="number">

<input id="carbs" placeholder="Carbs g" type="number">

<input id="fat" placeholder="Fat g" type="number">

<input id="fiber" placeholder="Fiber g" type="number">

<button onclick="addFood()">Add Food</button>

</div>

<div class="card">

<h2>📊 Today's Nutrition</h2>

<p>Calories: <span id="totalCalories">0</span></p>

<p>Protein: <span id="totalProtein">0</span> g</p>

<p>Carbs: <span id="totalCarbs">0</span> g</p>

<p>Fat: <span id="totalFat">0</span> g</p>

<p>Fiber: <span id="totalFiber">0</span> g</p>

</div>

<script>

let data = JSON.parse(localStorage.getItem("mulk")) || {

pullups:0,

pushups:0,

crunches:0,

foods:[]

};

function addRep(type){

data[type]++;

save();

update();

}

function addFood(){

let food={

name:document.getElementById("food").value,

calories:Number(document.getElementById("calories").value),

protein:Number(document.getElementById("protein").value),

carbs:Number(document.getElementById("carbs").value),

fat:Number(document.getElementById("fat").value),

fiber:Number(document.getElementById("fiber").value)

};

data.foods.push(food);

save();

update();

}

function save(){

localStorage.setItem("mulk",JSON.stringify(data));

}

function update(){

document.getElementById("pullups").innerHTML=data.pullups;

document.getElementById("pushups").innerHTML=data.pushups;

document.getElementById("crunches").innerHTML=data.crunches;

let totals={

calories:0,

protein:0,

carbs:0,

fat:0,

fiber:0

};

data.foods.forEach(f=>{

totals.calories+=f.calories;

totals.protein+=f.protein;

totals.carbs+=f.carbs;

totals.fat+=f.fat;

totals.fiber+=f.fiber;

});

document.getElementById("totalCalories").innerHTML=totals.calories;

document.getElementById("totalProtein").innerHTML=totals.protein;

document.getElementById("totalCarbs").innerHTML=totals.carbs;

document.getElementById("totalFat").innerHTML=totals.fat;

document.getElementById("totalFiber").innerHTML=totals.fiber;

}

update();

</script>

</body>

</html>
